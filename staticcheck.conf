# staticcheck configuration for unofficial-notion-go.
#
# Run locally with:  staticcheck ./...
# Install with:      go install honnef.co/go/tools/cmd/staticcheck@latest
#
# Inherit staticcheck's default set (includes U1000 unused-code detection,
# excludes the opinionated ST10xx style checks). ST1005 is disabled because
# error strings here legitimately begin with the proper noun "Notion", which
# Go's convention exempts from the no-leading-capital rule.
checks = ["inherit", "-ST1005"]
